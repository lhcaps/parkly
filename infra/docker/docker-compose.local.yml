name: parkly-local

services:
  mysql:
    image: mysql:8.4
    container_name: parkly-mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPassword@123}
    ports:
      - "${COMPOSE_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../apps/api/db/scripts/bootstrap.sql:/docker-entrypoint-initdb.d/001-bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: parkly-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${COMPOSE_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    profiles: ["storage"]
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: parkly-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - "${COMPOSE_MINIO_API_PORT:-9000}:9000"
      - "${COMPOSE_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    profiles: ["storage"]
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: parkly-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-parkly-media}
      MINIO_ALIAS: parkly
    volumes:
      - ./minio/init:/init:ro
    entrypoint: ["/bin/sh", "/init/create-bucket.sh"]
    restart: "no"

volumes:
  mysql-data:
  redis-data:
  minio-data:
